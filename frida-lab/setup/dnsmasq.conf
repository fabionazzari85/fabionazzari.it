# =============================================================================
# Configurazione DHCP — Frida Lab
# File: /etc/dnsmasq.d/fridalab.conf
# =============================================================================

# Interfaccia Wi-Fi del Pi
interface=wlan0

# Non interferire con l'interfaccia Ethernet
no-dhcp-interface=eth0

# Range DHCP: assegna IP da .10 a .50, lease 12 ore
dhcp-range=192.168.4.10,192.168.4.50,255.255.255.0,12h

# Il Pi e' il gateway e il DNS
dhcp-option=option:router,192.168.4.1
dhcp-option=option:dns-server,192.168.4.1

# Usa i DNS upstream del Pi
server=8.8.8.8
server=8.8.4.4

# Dominio locale
domain=fridalab.local

# Log delle query DNS (utile per debug)
log-queries
log-dhcp
