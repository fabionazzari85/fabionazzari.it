# =============================================================================
# Configurazione Access Point Wi-Fi — Frida Lab
# File: /etc/hostapd/hostapd.conf
# =============================================================================

interface=wlan0
driver=nl80211

# Nome rete e canale
ssid=FridaLab
channel=7
hw_mode=g

# Abilita 802.11n per prestazioni migliori
ieee80211n=1
wmm_enabled=1

# Autenticazione WPA2
auth_algs=1
wpa=2
wpa_key_mgmt=WPA-PSK
wpa_passphrase=fridalab2024
rsn_pairwise=CCMP

# Limiti
max_num_sta=5

# Logging (0=verbose, 2=info)
logger_syslog=-1
logger_syslog_level=2
