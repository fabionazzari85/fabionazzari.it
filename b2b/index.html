<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/">
    <title>Officina B2B | Fabio Nazzari</title>
    <meta name="description" content="Catalogo B2B per horeca, rivendita, eventi e hospitality: linee senza glutine pensate per l'uso professionale.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Officina B2B | Fabio Nazzari">
    <meta property="og:description" content="Catalogo B2B per horeca, rivendita, eventi e hospitality: linee senza glutine pensate per l'uso professionale.">
    <meta name="twitter:card" content="summary_large_image">
    <meta property="og:url" content="/b2b" />
    <meta property="og:locale" content="it_IT" />
    <link rel="canonical" href="/b2b" />
    <link rel="alternate" hreflang="it" href="/b2b" />
    <link rel="alternate" hreflang="en" href="/en/b2b" />
    <link rel="alternate" hreflang="x-default" href="/" />
    <script>window.__SITE_LOCALE__ = "it";</script>

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="image" href="assets/photos/fabio-ritratto-grissini.jpeg">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- React, ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <style>
        * {
            font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-weight: 700;
            letter-spacing: -0.05em;
        }

        .brand-name {
            font-family: 'Manrope', sans-serif;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        :root {
            --color-consulenza-primary: #A09070;
            --color-consulenza-secondary: #3D3B35;
            --color-officina-primary: #8B5E3C;
            --color-officina-secondary: #F0A030;
            --color-officina-tertiary: #D4722A;
            --color-pasticceria-primary: #2D2D2D;
            --color-pasticceria-secondary: #2ECDB0;
            --color-bg-light: #F5F3EF;
            --color-bg-cream: #FAF8F5;
            --color-text-dark: #1A1A18;
        }

        body {
            background-color: var(--color-bg-cream);
            color: var(--color-text-dark);
            line-height: 1.65;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at top right, rgba(160, 144, 112, 0.16), transparent 34%),
                radial-gradient(circle at bottom left, rgba(46, 205, 176, 0.08), transparent 28%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.55), rgba(255, 255, 255, 0));
            pointer-events: none;
            z-index: 0;
        }

        #root {
            position: relative;
            z-index: 1;
        }

        body.app-loading #root {
            opacity: 0;
            visibility: hidden;
        }

        body.app-ready #root {
            opacity: 1;
            visibility: visible;
        }

        /* ANIMATIONS */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
            }
            50% {
                transform: translateY(-25px) rotate(5deg);
            }
        }

        @keyframes float-slow {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes countUp {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes wave {
            0%, 100% {
                d: path('M0,50 Q25,25 50,50 T100,50 L100,100 L0,100 Z');
            }
            50% {
                d: path('M0,40 Q25,15 50,40 T100,40 L100,100 L0,100 Z');
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -1000px 0;
            }
            100% {
                background-position: 1000px 0;
            }
        }

        @keyframes pulse-subtle {
            0%, 100% {
                opacity: 0.8;
            }
            50% {
                opacity: 1;
            }
        }

        @keyframes ripple {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(4);
                opacity: 0;
            }
        }

        @keyframes ambientShift {
            0%, 100% {
                transform: translate3d(0, 0, 0) scale(1);
                opacity: 0.5;
            }
            50% {
                transform: translate3d(14px, -12px, 0) scale(1.06);
                opacity: 0.72;
            }
        }

        @keyframes gentleFloat {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-6px);
            }
        }

        /* UTILITIES */
        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        .fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
        }

        .float-animation {
            animation: float 6s ease-in-out infinite;
        }

        .float-animation-slow {
            animation: float-slow 8s ease-in-out infinite;
        }

        .slide-in-left {
            animation: slideInLeft 0.8s ease-out forwards;
            opacity: 0;
        }

        .slide-in-right {
            animation: slideInRight 0.8s ease-out forwards;
            opacity: 0;
        }

        .scale-in {
            animation: scaleIn 0.6s ease-out forwards;
            opacity: 0;
        }

        .smooth-page-transition {
            animation: fadeIn 0.4s ease-in-out;
        }

        .card-hover {
            transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.35s ease, border-color 0.35s ease, filter 0.35s ease;
            will-change: transform, box-shadow;
        }

        .card-hover:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 28px 58px rgba(26, 26, 24, 0.14);
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 0.24em;
            font-size: 0.72rem;
            font-weight: 700;
            color: #746957;
        }

        .eyebrow::before {
            content: '';
            width: 40px;
            height: 1px;
            background: currentColor;
            opacity: 0.55;
        }

        .section-kicker {
            text-transform: uppercase;
            letter-spacing: 0.22em;
            font-size: 0.72rem;
            font-weight: 700;
            color: #8B5E3C;
        }

        .section-title {
            font-size: clamp(3rem, 7vw, 5.8rem);
            line-height: 0.92;
            letter-spacing: -0.05em;
        }

        .hero-shell {
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(26, 26, 24, 0.08);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(250, 248, 245, 0.92));
            box-shadow: 0 34px 70px rgba(40, 35, 28, 0.12);
            backdrop-filter: blur(18px);
            isolation: isolate;
        }

        .hero-shell::after {
            content: '';
            position: absolute;
            right: -8%;
            top: 14%;
            width: min(34vw, 360px);
            height: min(34vw, 360px);
            border-radius: 999px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.85) 0%, rgba(255, 255, 255, 0) 72%);
            opacity: 0.55;
            pointer-events: none;
            filter: blur(10px);
            animation: ambientShift 14s ease-in-out infinite;
        }

        .hero-backdrop {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at top right, rgba(160, 144, 112, 0.18), transparent 34%),
                radial-gradient(circle at bottom left, rgba(139, 94, 60, 0.12), transparent 32%),
                linear-gradient(135deg, rgba(255, 255, 255, 0.65), rgba(245, 243, 239, 0.96));
            pointer-events: none;
        }

        .hero-metrics {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
            margin-top: 42px;
        }

        .hero-metric {
            border: 1px solid rgba(26, 26, 24, 0.08);
            border-radius: 22px;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.72);
            box-shadow: 0 18px 40px rgba(26, 26, 24, 0.06);
            transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.35s ease, background 0.35s ease;
        }

        .hero-metric strong {
            display: block;
            margin-bottom: 6px;
            font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            line-height: 0.95;
            color: #1A1A18;
        }

        .hero-metric span {
            display: block;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #6b7280;
        }

        .hero-portrait-frame {
            position: relative;
            padding: 18px;
            border-radius: 30px;
            background: linear-gradient(180deg, #efe8de, #e5ddd1);
            box-shadow: 0 28px 55px rgba(40, 35, 28, 0.16);
            transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.45s ease;
        }

        .hero-portrait-frame::before {
            content: '';
            position: absolute;
            inset: 14px;
            border: 1px solid rgba(26, 26, 24, 0.1);
            border-radius: 24px;
            pointer-events: none;
        }

        .hero-portrait {
            position: relative;
            border-radius: 22px;
            overflow: hidden;
            aspect-ratio: 4 / 5;
        }

        .hero-portrait img {
            transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .hero-note {
            position: absolute;
            left: -28px;
            bottom: 32px;
            max-width: 240px;
            padding: 20px 22px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(26, 26, 24, 0.08);
            box-shadow: 0 18px 40px rgba(26, 26, 24, 0.12);
            backdrop-filter: blur(16px);
            animation: gentleFloat 7s ease-in-out infinite;
        }

        .brand-emblems {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .brand-emblem {
            width: 68px;
            height: 68px;
            border-radius: 22px;
            border: 1px solid rgba(26, 26, 24, 0.08);
            background: rgba(255, 255, 255, 0.76);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 14px 30px rgba(26, 26, 24, 0.08);
            transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.35s ease, background 0.35s ease;
        }

        .editorial-panel {
            border-radius: 30px;
            border: 1px solid rgba(26, 26, 24, 0.08);
            background: rgba(255, 255, 255, 0.82);
            padding: 36px;
            box-shadow: 0 24px 55px rgba(26, 26, 24, 0.07);
            backdrop-filter: blur(16px);
        }

        .nav-shell {
            position: relative;
        }

        .site-header {
            padding-top: env(safe-area-inset-top);
        }

        .site-footer {
            padding-bottom: calc(4rem + env(safe-area-inset-bottom));
        }

        .responsive-hero-grid {
            gap: 3rem;
        }

        .home-entry-card,
        .store-entry-card,
        .consulting-window-card {
            min-height: 420px;
        }

        .store-detail-visual {
            min-height: 440px;
        }

        .anchor-offset {
            scroll-margin-top: 112px;
        }

        .refined-card {
            border-radius: 26px;
            border: 1px solid rgba(26, 26, 24, 0.08);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(248, 244, 238, 0.9));
            box-shadow: 0 20px 45px rgba(26, 26, 24, 0.08);
        }

        .dark-showcase {
            background:
                radial-gradient(circle at top right, rgba(46, 205, 176, 0.18), transparent 32%),
                radial-gradient(circle at bottom left, rgba(160, 144, 112, 0.18), transparent 28%),
                linear-gradient(135deg, #1A1A18, #2A2823);
        }

        .button-ripple {
            position: relative;
            overflow: hidden;
        }

        .button-ripple::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: rgba(255, 255, 255, 0.8);
            opacity: 0;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: ripple 0.6s ease-out;
        }

        .gradient-border {
            position: relative;
            background: white;
            border: 2px solid transparent;
            background-clip: padding-box;
            transition: all 0.3s ease;
        }

        .gradient-border::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 2px;
            background: linear-gradient(135deg, var(--consulenza-primary, #A09070), var(--officina-secondary, #F0A030));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .gradient-border:hover::before {
            opacity: 1;
        }

        .section-divider {
            width: 100%;
            height: 80px;
            background-color: transparent;
            position: relative;
        }

        /* Product specific */
        .product-image {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            transition: transform 0.3s ease;
            object-fit: cover;
        }

        .product-image:hover {
            transform: scale(1.05);
        }

        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            width: fit-content;
        }

        .quantity-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .quantity-btn:hover {
            background: #f3f4f6;
        }

        .quantity-input {
            width: 40px;
            text-align: center;
            border: none;
            font-weight: 600;
        }

        .quantity-input:focus {
            outline: none;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: white;
            border-left: 4px solid #10b981;
            padding: 16px 24px;
            border-radius: 6px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            animation: slideUp 0.4s ease-out;
            z-index: 1000;
        }

        .toast.success {
            border-left-color: #10b981;
        }

        .toast.error {
            border-left-color: #ef4444;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            animation: fadeIn 0.3s ease-out;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: scaleIn 0.3s ease-out;
        }

        /* Masonry grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .gallery-item {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #e5e7eb, #d1d5db);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease;
            object-fit: cover;
        }

        .gallery-item:hover {
            transform: scale(1.05);
        }

        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
            scroll-padding-top: 112px;
        }

        body {
            overflow-x: hidden;
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        /* Expandable menu */
        .menu-trigger {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 11px 16px;
            border-radius: 999px;
            border: 1px solid rgba(26, 26, 24, 0.08);
            background: rgba(255, 255, 255, 0.84);
            box-shadow: 0 14px 34px rgba(26, 26, 24, 0.08);
            backdrop-filter: blur(18px);
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
        }

        .menu-trigger:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 38px rgba(26, 26, 24, 0.12);
            background: rgba(255, 255, 255, 0.95);
        }

        .menu-trigger-label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #1A1A18;
        }

        .hamburger {
            display: inline-flex;
            flex-direction: column;
            gap: 5px;
            align-items: center;
            justify-content: center;
        }

        .hamburger span {
            width: 20px;
            height: 2px;
            background: var(--color-text-dark);
            border-radius: 999px;
            transition: transform 0.3s ease, opacity 0.25s ease;
        }

        .hamburger.active span:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }

        .nav-links {
            position: absolute;
            top: calc(100% + 14px);
            right: 0;
            width: min(360px, calc(100vw - 32px));
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 16px;
            border: 1px solid rgba(26, 26, 24, 0.08);
            border-radius: 26px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 24px 48px rgba(26, 26, 24, 0.14);
            backdrop-filter: blur(18px);
            transform: translateY(-12px) scale(0.98);
            transform-origin: top right;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.26s ease, transform 0.32s cubic-bezier(0.22, 1, 0.36, 1);
            max-height: calc(100vh - 120px);
            overflow: auto;
        }

        .nav-links.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .nav-links button {
            width: 100%;
            text-align: left;
            padding: 14px 16px;
            border-radius: 18px;
            transition: background 0.25s ease, color 0.25s ease, transform 0.25s ease;
        }

        .nav-links button:hover {
            background: rgba(139, 94, 60, 0.08);
            transform: translateX(2px);
        }

        .nav-links button.active-link {
            background: rgba(139, 94, 60, 0.12);
            color: #8B5E3C;
        }

        .nav-panel-intro {
            padding: 4px 6px 10px;
            border-bottom: 1px solid rgba(26, 26, 24, 0.06);
            margin-bottom: 6px;
        }

        .nav-panel-intro p:first-child {
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #8B5E3C;
            margin-bottom: 6px;
        }

        .nav-panel-intro p:last-child {
            font-size: 0.95rem;
            color: #4B5563;
        }

        @media (max-width: 1024px) {
            .responsive-hero-grid {
                gap: 2rem;
            }

            .hero-note {
                left: 18px;
                bottom: 18px;
                max-width: 220px;
                padding: 18px 18px;
            }

            .hero-metrics {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .brand-emblems {
                justify-content: flex-start;
            }

            .home-entry-card,
            .store-entry-card,
            .consulting-window-card {
                min-height: 380px;
            }

            .store-detail-visual {
                min-height: 360px;
            }
        }

        @media (max-width: 768px) {
            .menu-trigger {
                padding: 10px 14px;
            }

            .menu-trigger-label {
                font-size: 0.68rem;
                letter-spacing: 0.16em;
            }

            .nav-links {
                left: 0;
                right: 0;
                width: auto;
                top: calc(100% + 12px);
                border-radius: 24px;
                padding: 14px;
            }

            .nav-links button {
                padding: 12px 14px;
            }

            .hero-metrics {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .hero-note {
                position: static;
                max-width: none;
                margin-top: 16px;
                animation: none;
            }

            .section-title {
                font-size: clamp(2.6rem, 12vw, 4.2rem);
                line-height: 0.95;
            }

            .eyebrow {
                gap: 10px;
                font-size: 0.64rem;
                letter-spacing: 0.18em;
            }

            .eyebrow::before {
                width: 28px;
            }

            .section-kicker {
                font-size: 0.64rem;
                letter-spacing: 0.18em;
            }

            .brand-emblems {
                justify-content: flex-start;
                flex-wrap: wrap;
                margin-top: 16px;
